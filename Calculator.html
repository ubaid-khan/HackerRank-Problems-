<!DOCTYPE html>
<html>
<head>
	<title>Calculator Web App</title>
	

	<script>
		
		function display(val){
			document.getElementById("result").value += val;
		}

		function solve(){
			let x = document.getElementById("result").value;
			let y = eval(x);
			document.getElementById("result").value=y;
		}

		function clr(){
			document.getElementById("result").value = "";
		}
	</script>

	<style>

		.title{
			margin-bottom: 10px;
			text-align: center;
			width: 100%;
			color:green;
			border: solid black 2px;
		}

		input[type = "button"]{
			background-color: black;
			color:white;
			border: solid black 2px;
			width: 100%;
		}

		input[type="text"]{
			background-color: white;
			border:solid black 2px;
			width:100%;
		}

	}

    </style>
</head>





<body>
	<div class ="title" >Web Calculator</div>

	  <table border = "2px" align="center" height="100%" width="50%">
	  	
	  	<tr>
	  		<td colspan="4"><input class="text" id="result" /></td>
	  	</tr>

	  	<tr>
	  		<td><input class = "button" type="button" value="c" onclick="clr()"></td>

	  	    <td><input class="button" type = "button" value = "<" onclick="back()"></td>
	  	    <td><input class="button" type = "button" value = "x" onclick="display('*')"></td>
	  	    <td><input class="button" type = "button" value = "+" onclick="display('+')"></td>
	  	</tr>   
	  		<td> <input class="button" type = "button" value = "7" onclick="display(7)"></td>
	  		<td> <input class="button" type = "button" value = "8" onclick="display(8)"></td>
	  		<td> <input class="button" type = "button" value = "9" onclick="display(9)"></td>
	  		<td> <input class="button" type = "button" value = "-" onclick="display('-')"></td>
   		 <tr>
	  	    <td> <input class="button" type = "button" value = "4" onclick="display(4)"></td>
	  	    <td> <input class="button" type = "button" value = "5" onclick="display(5)"></td>
	  	    <td> <input class="button" type = "button" value = "6" onclick="display(6)"></td>
	  	    <td> <input class="button" type = "button" value = "/" onclick="display('/')"></td>
	  	 </tr>

         <tr>
	  	    <td> <input class="button" type = "button" value = "1" onclick="display(1)"></td>
	  	    <td> <input class="button" type = "button" value = "2" onclick="display(2)"></td>
	  	    <td> <input class="button" type = "button" value = "3" onclick="display(3)"></td>
	  	    <td> <input class="button" type = "button" value = "=" onclick="solve()"></td>
	  	 </tr>
	  	<tr>
	  		<td> <input class="button" type="button"   value="0"   onclick="display(0)"></td>
	  		<td> <input class="button" type="button"   value="."   onclick="display('.')"></td>
	  	</tr>
	  </table>

</body>
</html>
