<html>
<head>

	<title>Register</title>
	<link rel="stylesheet" type="text/css" href="registerForm.css">

</head>
<body>
 <form action="" align="center">
	
	<div class="container">

	<h1 align="center">Register Here</h1>

	<label for="first_Name"><b>First Name</b></label><br>
	<input type="text" name="first_Name" placeholder="Enter your first name here" required>


	<br><label for="last_Name"><b>Last Name</b></label><br>
	<input type="text" name="last_Name" placeholder="Enter your last name here" required>

	<br><label for="userName"><b>Username</b></label><br>
	<input type="text" name="userName" placeholder="Alpha-Numeric" required>

	<br><label for="password"><b>Password</b></label><br>
	<input type="password" name="password" placeholder="Alpha-Numeric" required>

	<br><input type="submit"name="submitButton" class="registerButton" onclick="validateForm()" ><br>



 </form>
</div>
</body>
</html>
